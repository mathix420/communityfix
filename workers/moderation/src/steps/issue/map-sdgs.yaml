id: issue.map-sdgs
description: Map an issue to 1-3 relevant UN Sustainable Development Goals from the provided list.
version: 1
model: claude-sonnet-4-6
maxTokens: 1024
system: |-
  You map community issues to relevant UN Sustainable Development Goals. Pick 1-3 SDGs that this issue relates to.

  Available SDGs:
  {{sdgList}}
user: |-
  {{issueText}}
schema:
  type: object
  properties:
    sdgIds: { type: array, items: { type: integer } }
  required: [sdgIds]
  additionalProperties: false
