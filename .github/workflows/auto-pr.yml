name: Auto-PR

on:
  # Only staging pushes open the release PR; feature branches no longer
  # auto-open a PR into staging.
  push:
    branches: [staging]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # STAGING → MASTER release PR.
  # On every push to staging, ensure there's an open PR from staging
  # into master with an AI-generated description (or a fallback list
  # of commits if ANTHROPIC_API_KEY is not configured).
  # ────────────────────────────────────────────────────────────────
  pull-request-master:
    name: Create Pull Request to Master
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Check for existing PR
        id: check_pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: .github/scripts/check-pr-exists.sh --base master --head staging

      - name: Create PR to Master
        if: steps.check_pr.outputs.result == '0'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --title "🚀 Release: master ⬅️ staging" \
            --body "🤖 Generating PR description..." \
            --base master \
            --head staging

      - name: Collect changes
        if: steps.check_pr.outputs.result == '0'
        run: .github/scripts/collect-git-changes.sh --base origin/master --head staging --output-commits commits.txt --output-diff-stat diff_stat.txt

      - name: Generate PR description with Claude
        if: steps.check_pr.outputs.result == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COMMITS=$(cat commits.txt)
          DIFF_STAT=$(cat diff_stat.txt)

          cat > prompt.txt <<EOF
          Write a release PR description for merging staging into master.

          Based on the commits and changes below, write a clear description:
          - Start with 1-2 sentences summarizing what's in this release
          - List the main changes as bullet points grouped by type (features, fixes, improvements)
          - Use relevant emojis to make the description more engaging (✨ for features, 🐛 for fixes, ⚡ for improvements, 📚 for docs, etc.)
          - Keep it concise and readable

          Commits:
          ${COMMITS}

          Files changed:
          ${DIFF_STAT}

          Write the PR description in markdown. No headers, just the content:
          EOF

          .github/scripts/call-claude-api.sh \
            --prompt-file prompt.txt \
            --output pr_body.md \
            --fallback "Release PR from staging to master.

          $(cat commits.txt | sed 's/^/- /')"

      - name: Update PR description
        if: steps.check_pr.outputs.result == '0'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr edit staging --body-file pr_body.md
