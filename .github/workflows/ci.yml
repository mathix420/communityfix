name: CI

on:
  push:
    branches: [master, staging]
  # synchronize fires on every pushed commit, including while the PR is a
  # draft; ready_for_review re-runs when a draft is marked ready.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOPPLER_PROJECT: communityfix

# Build + deploy run entirely here. Production goes to the `communityfix`
# Worker on every master push; staging goes to `communityfix-staging` on every
# staging push. The branch-aware Hyperdrive / KV IDs in nuxt.config.ts are
# selected by `WORKERS_CI_BRANCH`, which we set explicitly per job.

jobs:
  # ────────────────────────────────────────────────────────────────
  # TYPECHECK — vue-tsc against the project. Required check for PRs
  # (see master/staging rulesets). Job name `typecheck` must match
  # the `context` listed in the rulesets.
  # ────────────────────────────────────────────────────────────────
  typecheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx vue-tsc --noEmit

  # ────────────────────────────────────────────────────────────────
  # UNIT TESTS — vitest against tests/unit only. API/integration
  # tests live under tests/api and need a running dev server +
  # seeded Postgres, so they stay out of CI for now. SKIP_DB_SETUP=1
  # tells tests/global-setup.ts to bypass the migrate+seed step.
  # ────────────────────────────────────────────────────────────────
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run unit tests
        env:
          SKIP_DB_SETUP: '1'
        run: bunx vitest run tests/unit

  # ────────────────────────────────────────────────────────────────
  # BUILD — compiles the Worker bundle so broken builds are caught
  # before merge. Required check for PRs (see master/staging
  # rulesets). Replaces the old "Workers Builds: communityfix"
  # check that came from Cloudflare's connected-repo builder.
  # ────────────────────────────────────────────────────────────────
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build Worker bundle
        env:
          # Non-master branches resolve to staging bindings in nuxt.config.ts,
          # which matches what would be deployed if this PR landed.
          WORKERS_CI_BRANCH: ${{ github.head_ref }}
        run: bun run build

  # ────────────────────────────────────────────────────────────────
  # CODE QUALITY — vize (lint + format) and fallow (dead code) on every
  # PR commit, drafts included. Posts ONE sticky comment summarising both
  # tools and updates it in place on each re-run (matched by the hidden
  # <!-- code-quality --> marker). Fails the check if any tool fails;
  # warnings are advisory and don't block.
  # ────────────────────────────────────────────────────────────────
  code-quality:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      # Each check runs to completion (set +e) and records its exit code +
      # a one-line summary as step outputs; the gate is deferred to the end
      # so the comment always posts first.
      - name: vize lint
        id: lint
        run: |
          set +e
          bun run lint 2>&1 | tee lint.out
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          errs=$(grep -oE '[0-9]+ errors?' lint.out | tail -1 | grep -oE '[0-9]+'); errs=${errs:-0}
          warns=$(grep -oE '[0-9]+ warnings?' lint.out | tail -1 | grep -oE '[0-9]+'); warns=${warns:-0}
          echo "summary=$errs errors · $warns warnings" >> "$GITHUB_OUTPUT"

      - name: vize format
        id: fmt
        run: |
          set +e
          bun run format:check 2>&1 | tee fmt.out
          code=${PIPESTATUS[0]}
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "0" ]; then
            echo "summary=all files formatted" >> "$GITHUB_OUTPUT"
          else
            n=$(grep -oE '[0-9]+ file\(s\) would be reformatted' fmt.out | grep -oE '[0-9]+' | tail -1)
            echo "summary=${n:-?} file(s) need formatting" >> "$GITHUB_OUTPUT"
          fi

      - name: fallow dead-code
        id: fallow
        run: |
          set +e
          bunx fallow dead-code 2>&1 | tee fallow.out
          code=${PIPESTATUS[0]}
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "0" ]; then
            echo "summary=no issues" >> "$GITHUB_OUTPUT"
          else
            s=$(grep -oE '✗ [^(]+' fallow.out | tail -1 | sed 's/[[:space:]]*$//')
            echo "summary=${s:-issues found}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build comment
        env:
          LINT_CODE: ${{ steps.lint.outputs.code }}
          LINT_SUM: ${{ steps.lint.outputs.summary }}
          FMT_CODE: ${{ steps.fmt.outputs.code }}
          FMT_SUM: ${{ steps.fmt.outputs.summary }}
          FALLOW_CODE: ${{ steps.fallow.outputs.code }}
          FALLOW_SUM: ${{ steps.fallow.outputs.summary }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          icon() { [ "$1" = "0" ] && printf '✅' || printf '❌'; }
          {
            echo '<!-- code-quality -->'
            echo '### 🧹 Code quality'
            echo
            echo '| Check | | Summary |'
            echo '|:--|:-:|:--|'
            echo "| \`vize\` lint | $(icon "$LINT_CODE") | $LINT_SUM |"
            echo "| \`vize\` format | $(icon "$FMT_CODE") | $FMT_SUM |"
            echo "| \`fallow\` dead-code | $(icon "$FALLOW_CODE") | $FALLOW_SUM |"
            echo
          } > comment.md
          # On failure only, attach the tool's tail output in a collapsed block.
          add() { if [ "$3" != "0" ]; then { echo "<details><summary>$1 output</summary>"; echo; echo '```'; tail -n 40 "$2"; echo '```'; echo '</details>'; echo; } >> comment.md; fi; }
          add 'vize lint' lint.out "$LINT_CODE"
          add 'vize format' fmt.out "$FMT_CODE"
          add 'fallow dead-code' fallow.out "$FALLOW_CODE"
          echo "<sub>updated for \`${HEAD_SHA:0:7}\` · <a href=\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\">run #$GITHUB_RUN_NUMBER</a></sub>" >> comment.md

      - name: Post or update PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('comment.md', 'utf8')
            const marker = '<!-- code-quality -->'
            const { owner, repo } = context.repo
            // One branch can back several open PRs (e.g. fallow → staging and
            // fallow → master). The triggering event only references one of
            // them, so look them all up by head and post/update on each.
            const branch = context.payload.pull_request.head.ref
            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', head: `${owner}:${branch}`,
            })
            const targets = prs.length
              ? prs.map(p => p.number)
              : [context.payload.pull_request.number]
            for (const issue_number of targets) {
              const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number })
              const existing = comments.find(c => c.body && c.body.includes(marker))
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body })
              }
            }

      - name: Gate
        run: |
          fail=0
          [ "${{ steps.lint.outputs.code }}" = "0" ] || fail=1
          [ "${{ steps.fmt.outputs.code }}" = "0" ] || fail=1
          [ "${{ steps.fallow.outputs.code }}" = "0" ] || fail=1
          exit $fail

  # ────────────────────────────────────────────────────────────────
  # PRODUCTION DEPLOY — runs on every master push. Builds the Worker
  # against production bindings, runs Drizzle + custom migrations on
  # the Neon production direct URL, then `wrangler deploy`s to the
  # `communityfix` Worker.
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - uses: dopplerhq/cli-action@v4
      - run: bun install --frozen-lockfile
      - name: Deploy moderation Workflow worker (production)
        run: |
          bunx wrangler deploy --config workers/moderation/wrangler.jsonc
          doppler secrets download -c prd --no-file --format json \
            | jq '{ NUXT_OPENAI_API_KEY, NUXT_ANTHROPIC_API_KEY, NUXT_ADMIN_EMAILS }' \
            | bunx wrangler secret bulk --config workers/moderation/wrangler.jsonc
      - name: Build Worker bundle (production bindings)
        env:
          WORKERS_CI_BRANCH: master
        run: bun run build
      - name: Run Drizzle + custom migrations against Neon production
        run: doppler run -c prd -- bun run server/database/migrate.ts
      - name: Sync Doppler secrets to Cloudflare Worker (production)
        # Mirrors every secret from the Doppler `prd` config onto the
        # `communityfix` Worker via `wrangler secret bulk`. The DOPPLER_* meta
        # keys are filtered out. Runs before deploy so the new bundle boots
        # with up-to-date secrets.
        run: |
          doppler secrets download -c prd --no-file --format json \
            | jq 'del(.DOPPLER_PROJECT, .DOPPLER_ENVIRONMENT, .DOPPLER_CONFIG)' \
            | bunx wrangler secret bulk --name communityfix
      - name: Deploy to Cloudflare Workers (production)
        # Wrangler picks up `.wrangler/deploy/config.json`, which Nitro emits
        # during `bun run build` to redirect to `.output/server/wrangler.json`.
        run: bunx wrangler deploy

  # ────────────────────────────────────────────────────────────────
  # STAGING DEPLOY — runs on every staging push. Same shape as
  # production, but with staging bindings and `--name` overridden so
  # the deploy lands on the dedicated `communityfix-staging` Worker
  # instead of the production one.
  # ────────────────────────────────────────────────────────────────
  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: preview
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - uses: dopplerhq/cli-action@v4
      - run: bun install --frozen-lockfile
      - name: Deploy moderation Workflow worker (staging)
        run: |
          bunx wrangler deploy --config workers/moderation/wrangler.jsonc --env staging
          doppler secrets download -c stg --no-file --format json \
            | jq '{ NUXT_OPENAI_API_KEY, NUXT_ANTHROPIC_API_KEY, NUXT_ADMIN_EMAILS }' \
            | bunx wrangler secret bulk --config workers/moderation/wrangler.jsonc --env staging
      - name: Build Worker bundle (staging bindings)
        env:
          WORKERS_CI_BRANCH: staging
        run: bun run build
      - name: Run Drizzle + custom migrations against Neon staging
        run: doppler run -c stg -- bun run server/database/migrate.ts
      - name: Sync Doppler secrets to Cloudflare Worker (staging)
        # Mirrors every secret from the Doppler `stg` config onto the
        # `communityfix-staging` Worker. See production for filter rationale.
        run: |
          doppler secrets download -c stg --no-file --format json \
            | jq 'del(.DOPPLER_PROJECT, .DOPPLER_ENVIRONMENT, .DOPPLER_CONFIG)' \
            | bunx wrangler secret bulk --name communityfix-staging
      - name: Deploy to Cloudflare Workers (staging)
        # See production deploy step for how the redirected config is found.
        # `--name` overrides the worker name so this lands on the dedicated
        # staging Worker instead of the production one.
        run: bunx wrangler deploy --name communityfix-staging
