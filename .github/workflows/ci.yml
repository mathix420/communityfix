name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOPPLER_PROJECT: communityfix

# Build + deploy run entirely here. Production goes to the `communityfix`
# Worker on every master push; staging goes to `communityfix-staging` on every
# staging push. The branch-aware Hyperdrive / KV IDs in nuxt.config.ts are
# selected by `WORKERS_CI_BRANCH`, which we set explicitly per job.

jobs:
  # ────────────────────────────────────────────────────────────────
  # TYPECHECK — vue-tsc against the project. Required check for PRs
  # (see master/staging rulesets). Job name `typecheck` must match
  # the `context` listed in the rulesets.
  # ────────────────────────────────────────────────────────────────
  typecheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx vue-tsc --noEmit

  # ────────────────────────────────────────────────────────────────
  # UNIT TESTS — vitest against tests/unit only. API/integration
  # tests live under tests/api and need a running dev server +
  # seeded Postgres, so they stay out of CI for now. SKIP_DB_SETUP=1
  # tells tests/global-setup.ts to bypass the migrate+seed step.
  # ────────────────────────────────────────────────────────────────
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run unit tests
        env:
          SKIP_DB_SETUP: '1'
        run: bunx vitest run tests/unit

  # ────────────────────────────────────────────────────────────────
  # BUILD — compiles the Worker bundle so broken builds are caught
  # before merge. Required check for PRs (see master/staging
  # rulesets). Replaces the old "Workers Builds: communityfix"
  # check that came from Cloudflare's connected-repo builder.
  # ────────────────────────────────────────────────────────────────
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build Worker bundle
        env:
          # Non-master branches resolve to staging bindings in nuxt.config.ts,
          # which matches what would be deployed if this PR landed.
          WORKERS_CI_BRANCH: ${{ github.head_ref }}
        run: bun run build

  # ────────────────────────────────────────────────────────────────
  # PRODUCTION DEPLOY — runs on every master push. Builds the Worker
  # against production bindings, runs Drizzle + custom migrations on
  # the Neon production direct URL, then `wrangler deploy`s to the
  # `communityfix` Worker.
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: dopplerhq/cli-action@v4
      - run: bun install --frozen-lockfile
      - name: Build Worker bundle (production bindings)
        env:
          WORKERS_CI_BRANCH: master
        run: bun run build
      - name: Run Drizzle + custom migrations against Neon production
        run: doppler run -c prd -- bun run server/database/migrate.ts
      - name: Sync Doppler secrets to Cloudflare Worker (production)
        # Mirrors every secret from the Doppler `prd` config onto the
        # `communityfix` Worker via `wrangler secret bulk`. The DOPPLER_* meta
        # keys are filtered out. Runs before deploy so the new bundle boots
        # with up-to-date secrets.
        run: |
          doppler secrets download -c prd --no-file --format json \
            | jq 'del(.DOPPLER_PROJECT, .DOPPLER_ENVIRONMENT, .DOPPLER_CONFIG)' \
            | bunx wrangler secret bulk --name communityfix
      - name: Deploy to Cloudflare Workers (production)
        # Wrangler picks up `.wrangler/deploy/config.json`, which Nitro emits
        # during `bun run build` to redirect to `.output/server/wrangler.json`.
        run: bunx wrangler deploy

  # ────────────────────────────────────────────────────────────────
  # STAGING DEPLOY — runs on every staging push. Same shape as
  # production, but with staging bindings and `--name` overridden so
  # the deploy lands on the dedicated `communityfix-staging` Worker
  # instead of the production one.
  # ────────────────────────────────────────────────────────────────
  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: preview
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: dopplerhq/cli-action@v4
      - run: bun install --frozen-lockfile
      - name: Build Worker bundle (staging bindings)
        env:
          WORKERS_CI_BRANCH: staging
        run: bun run build
      - name: Run Drizzle + custom migrations against Neon staging
        run: doppler run -c stg -- bun run server/database/migrate.ts
      - name: Sync Doppler secrets to Cloudflare Worker (staging)
        # Mirrors every secret from the Doppler `stg` config onto the
        # `communityfix-staging` Worker. See production for filter rationale.
        run: |
          doppler secrets download -c stg --no-file --format json \
            | jq 'del(.DOPPLER_PROJECT, .DOPPLER_ENVIRONMENT, .DOPPLER_CONFIG)' \
            | bunx wrangler secret bulk --name communityfix-staging
      - name: Deploy to Cloudflare Workers (staging)
        # See production deploy step for how the redirected config is found.
        # `--name` overrides the worker name so this lands on the dedicated
        # staging Worker instead of the production one.
        run: bunx wrangler deploy --name communityfix-staging
